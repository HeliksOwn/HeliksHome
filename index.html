<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeliksHome</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="app.js"></script>
</head>
<body>

<div class="tabs">
  <div class="tab" onclick="showTab('vaer', this)">🌿 W10</div>
  <div class="tab active" onclick="showTab('ruter', this)">🚌 Ruter</div>
  <div class="tab" onclick="showTab('natur', this)">🌡  Yr</div>
</div>

<div id="vaer" class="page">
  <div class="section-label">Inne</div>
  <div class="grid">
    <div class="card">
      <h2>Temperatur</h2>
      <div class="value" id="temp-in">--°C</div>
    </div>
    <div class="card">
      <h2>Fuktighet</h2>
      <div class="value" id="humidity-in">--%</div>
    </div>
    <div class="card">
      <h2>CO₂</h2>
      <div class="value" id="co2">-- ppm</div>
    </div>
    <div class="card">
      <h2>Støy</h2>
      <div class="value" id="noise">-- dB</div>
    </div>
    <div class="card">
      <h2>Lufttrykk</h2>
      <div class="value" id="pressure">-- hPa</div>
    </div>
  </div>

  <div class="section-label">Ute</div>
  <div class="grid">
    <div class="card">
      <h2>Temperatur</h2>
      <div class="value" id="temp-out">--°C</div>
    </div>
    <div class="card">
      <h2>Fuktighet</h2>
      <div class="value" id="humidity-out">--%</div>
    </div>
  </div>
</div>

<div id="ruter" class="page active">
  <div class="stop-section">
    <h2>Bislett</h2>
    <div id="bislett"></div>
  </div>
  <div class="stop-section">
    <h2>Colletts gate</h2>
    <div id="colletts"></div>
  </div>
</div>

<div id="natur" class="page">
  <div class="natur-grid">
    <div class="natur-card">
      <div class="natur-label">☀️ Soloppgang</div>
      <div class="natur-value" id="sunrise">--:--</div>
    </div>
    <div class="natur-card">
      <div class="natur-label">🌇 Solnedgang</div>
      <div class="natur-value" id="sunset">--:--</div>
    </div>
    <div class="natur-card">
      <div class="natur-label">🔆 UV-indeks</div>
      <div class="natur-value" id="uv">--</div>
    </div>
    <!-- <div class="natur-card">
      <div class="natur-label">🌸 Pollen</div>
      <div class="natur-value" id="pollen">--</div>
    </div> -->
  </div>

  <div class="forecast-section">
    <h2>7-dagersprognose</h2>
    <div id="forecast"></div>
  </div>

  <div class="hourly-section">
    <div id="hourly-forecast"></div>
  </div>
</div>

<script>
</script>
</body>
</html>
