<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeliksHome</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #1a1a2e;
      color: #eee;
    }
    .tabs {
      display: flex;
      background: #0f0f1a;
      border-bottom: 2px solid #333;
    }
    .tab {
      padding: 1rem 2rem;
      cursor: pointer;
      color: #aaa;
      font-size: 1rem;
    }
    .tab.active {
      color: #fff;
      border-bottom: 2px solid #4a9eff;
      margin-bottom: -2px;
    }
    .page { display: none; }
    .page.active { display: block; }

    /* Værsiden */
    #vaer { padding: 2rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
    }
    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 1.5rem;
    }
    .card h2 { font-size: 1rem; color: #aaa; margin-bottom: 0.5rem; }
    .card .value { font-size: 2.5rem; font-weight: 700; }

    /* Rutersiden */
    #ruter {
      background: #fff;
      color: #111;
      min-height: calc(100vh - 56px);
      padding: 2rem;
    }
    .stop-section { margin-bottom: 2.5rem; }
    .stop-section h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #E3001B;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #E3001B;
    }
    .line-group { margin-bottom: 1.5rem; }
    .line-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }
    .line-badge {
      background: #E3001B;
      color: #fff;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 0.2rem 0.7rem;
      border-radius: 6px;
      min-width: 2.5rem;
      text-align: center;
    }
    .line-name {
      font-size: 0.85rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .departure {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.4rem 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .departure:last-child { border-bottom: none; }
    .direction-arrow {
      font-size: 0.85rem;
      color: #E3001B;
      min-width: 1rem;
    }
    .dest {
      flex: 1;
      font-size: 0.95rem;
      color: #222;
    }
    .realtime-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #00a651;
      flex-shrink: 0;
    }
    .time {
      font-size: 1rem;
      font-weight: 700;
      color: #111;
      min-width: 3.5rem;
      text-align: right;
    }
  </style>
</head>
<body>

<div class="tabs">
  <div class="tab active" onclick="showTab('vaer', this)">🌡 Vær</div>
  <div class="tab" onclick="showTab('ruter', this)">🚌 Ruter</div>
</div>

<div id="vaer" class="page active">
  <div class="grid">
    <div class="card">
      <h2>Ute</h2>
      <div class="value" id="temp-out">--°C</div>
    </div>
    <div class="card">
      <h2>Inne</h2>
      <div class="value" id="temp-in">--°C</div>
    </div>
  </div>
</div>

<div id="ruter" class="page">
  <div class="stop-section">
    <h2>Bislett</h2>
    <div id="bislett"></div>
  </div>
  <div class="stop-section">
    <h2>Colletts gate</h2>
    <div id="colletts"></div>
  </div>
</div>

<script>
  function showTab(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
  }

  // --- NETATMO ---
  const ACCESS_TOKEN = "63510e77148076b5ac0de4a2|eaf4e49712727ec246e4a17940d0756c";

  async function fetchWeather() {
    const res = await fetch("https://api.netatmo.com/api/getstationsdata", {
      headers: { "Authorization": "Bearer " + ACCESS_TOKEN }
    });
    const data = await res.json();
    const indoor = data.body.devices[0].dashboard_data;
    document.getElementById("temp-in").textContent = indoor.Temperature + "°C";
    const outdoor = data.body.devices[0].modules.find(m => m.type === "NAModule1");
    if (outdoor && outdoor.dashboard_data) {
      document.getElementById("temp-out").textContent = outdoor.dashboard_data.Temperature + "°C";
    }
  }

  // --- ENTUR ---
  const STOPS = [
    { id: "NSR:StopPlace:58353", name: "Bislett", elementId: "bislett" },
    { id: "NSR:StopPlace:6286",  name: "Colletts gate", elementId: "colletts" }
  ];

  async function fetchDepartures(stop) {
    const query = `{
      stopPlace(id: "${stop.id}") {
        estimatedCalls(timeRange: 3600, numberOfDepartures: 30) {
          expectedDepartureTime
          destinationDisplay { frontText }
          serviceJourney {
            journeyPattern {
              line { publicCode transportMode }
            }
          }
          realtime
        }
      }
    }`;
    const res = await fetch("https://api.entur.io/journey-planner/v3/graphql", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "ET-Client-Name": "helikshome-dashboard"
      },
      body: JSON.stringify({ query })
    });
    const data = await res.json();
    return data.data.stopPlace.estimatedCalls;
  }

  function formatTime(isoString) {
    const d = new Date(isoString);
    const now = new Date();
    const diffMin = Math.round((d - now) / 60000);
    if (diffMin <= 0) return "Nå";
    if (diffMin < 60) return diffMin + " min";
    return d.toTimeString().slice(0, 5);
  }

  function renderDepartures(calls, elementId) {
    const el = document.getElementById(elementId);
    if (!calls || calls.length === 0) {
      el.innerHTML = '<p style="color:#aaa">Ingen avganger funnet</p>';
      return;
    }

    // Grupper per linje
    const byLine = {};
    for (const call of calls) {
      const code = call.serviceJourney.journeyPattern.line.publicCode;
      if (!byLine[code]) byLine[code] = [];
      byLine[code].push(call);
    }

    el.innerHTML = "";
    for (const [lineCode, departures] of Object.entries(byLine)) {
      const group = document.createElement("div");
      group.className = "line-group";

      const mode = departures[0].serviceJourney.journeyPattern.line.transportMode;
      const modeLabel = mode === "tram" ? "Trikk" : mode === "bus" ? "Buss" : mode;

      group.innerHTML = `
        <div class="line-header">
          <span class="line-badge">${lineCode}</span>
          <span class="line-name">${modeLabel}</span>
        </div>
      `;

      for (const dep of departures.slice(0, 4)) {
        const dest = dep.destinationDisplay.frontText;
        const div = document.createElement("div");
        div.className = "departure";
        div.innerHTML = `
          <span class="direction-arrow">→</span>
          <span class="dest">${dest}</span>
          ${dep.realtime ? '<span class="realtime-dot"></span>' : ''}
          <span class="time">${formatTime(dep.expectedDepartureTime)}</span>
        `;
        group.appendChild(div);
      }
      el.appendChild(group);
    }
  }

  async function fetchAllDepartures() {
    for (const stop of STOPS) {
      const calls = await fetchDepartures(stop);
      renderDepartures(calls, stop.elementId);
    }
  }

  fetchWeather();
  setInterval(fetchWeather, 5 * 60 * 1000);
  fetchAllDepartures();
  setInterval(fetchAllDepartures, 60 * 1000);
</script>
</body>
</html>
